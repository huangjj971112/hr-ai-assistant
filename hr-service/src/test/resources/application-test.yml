spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:hr_ai_assistant_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:

  sql:
    init:
      mode: always

app:
  ai:
    provider: test
    model: test
    agent-memory:
      store: in-memory
      pending-leave-ttl: 20m
